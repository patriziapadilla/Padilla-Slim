<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Padilla Slim | 3D Skin Reset Video</title>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  background:#020406;
  color:white;
  font-family:Arial, Helvetica, sans-serif;
  overflow:hidden;
}
#app{
  width:100vw;
  height:100vh;
  position:relative;
  background:#020406;
}
.scene{
  position:absolute;
  inset:0;
  opacity:0;
  transition:opacity 1.2s ease;
}
.scene.active{opacity:1;z-index:2}
.scene img{
  width:100%;
  height:100%;
  object-fit:cover;
  transform:scale(1.12);
  animation:kenburns 9s ease forwards;
}
@keyframes kenburns{
  from{transform:scale(1.15) translate(0,0)}
  to{transform:scale(1.02) translate(-1.5%,1%)}
}
.dark{
  position:absolute;
  inset:0;
  z-index:4;
  background:
    radial-gradient(circle at 65% 35%, transparent 0 20%, rgba(0,0,0,.28) 55%),
    linear-gradient(to top,rgba(0,0,0,.82),rgba(0,0,0,.25),rgba(0,0,0,.42));
}
.copy{
  position:absolute;
  z-index:8;
  left:6%;
  bottom:9%;
  max-width:820px;
}
.kicker{
  color:#88e3dc;
  font-size:12px;
  letter-spacing:4px;
  text-transform:uppercase;
  font-weight:900;
  margin-bottom:14px;
}
h1{
  margin:0 0 16px;
  font-size:clamp(42px,7vw,96px);
  line-height:.88;
  font-family:Georgia,serif;
  letter-spacing:-3px;
}
p{
  margin:0;
  font-size:clamp(17px,2vw,25px);
  line-height:1.45;
  color:rgba(255,255,255,.86);
  max-width:760px;
}
.progress{
  position:absolute;
  left:0;
  bottom:0;
  width:0%;
  height:5px;
  background:linear-gradient(90deg,#88e3dc,#77aef7,#f2c879);
  z-index:20;
  transition:width .4s linear;
}
.play{
  position:absolute;
  inset:0;
  z-index:50;
  display:grid;
  place-items:center;
  background:
    radial-gradient(circle at center,rgba(20,80,90,.35),rgba(0,0,0,.92) 68%);
  text-align:center;
  padding:25px;
}
.play h2{
  font-family:Georgia,serif;
  font-size:clamp(44px,8vw,96px);
  line-height:.9;
  margin:0 0 20px;
}
.play p{
  margin:0 auto 28px;
}
button{
  border:0;
  background:linear-gradient(90deg,#88e3dc,#77aef7);
  color:#031014;
  padding:16px 28px;
  border-radius:999px;
  font-weight:900;
  letter-spacing:1px;
  cursor:pointer;
  font-size:14px;
}
.skip{
  position:absolute;
  right:22px;
  bottom:22px;
  z-index:30;
  background:rgba(255,255,255,.12);
  border:1px solid rgba(255,255,255,.28);
  color:white;
  padding:11px 16px;
}
.effect{
  position:absolute;
  inset:0;
  z-index:6;
  pointer-events:none;
  opacity:0;
}
.scene.active .steam{
  opacity:.75;
  background:
    radial-gradient(ellipse at 35% 90%,rgba(255,255,255,.45),transparent 28%),
    radial-gradient(ellipse at 65% 90%,rgba(180,230,255,.32),transparent 34%);
  filter:blur(16px);
  animation:steam 4s ease-in-out infinite;
}
@keyframes steam{
  0%,100%{transform:translateY(50px);opacity:.25}
  50%{transform:translateY(-60px);opacity:.8}
}
.scene.active .suction{
  opacity:.75;
  background:
    radial-gradient(circle at 48% 38%,rgba(110,220,255,.35),transparent 18%),
    repeating-radial-gradient(circle at 48% 38%,rgba(130,230,255,.24) 0 2px,transparent 3px 48px);
  mix-blend-mode:screen;
  animation:pulse 2.8s infinite;
}
.scene.active .heat{
  opacity:.8;
  background:
    radial-gradient(circle at 50% 43%,rgba(255,74,35,.38),transparent 22%),
    repeating-radial-gradient(circle at 50% 43%,rgba(255,155,70,.25) 0 2px,transparent 3px 55px);
  mix-blend-mode:screen;
  animation:pulse 2.5s infinite;
}
.scene.active .cold{
  opacity:.9;
  background:
    linear-gradient(180deg,rgba(105,210,255,.32),rgba(105,210,255,.16),transparent 65%),
    repeating-radial-gradient(circle at 50% 35%,rgba(120,220,255,.28) 0 2px,transparent 4px 45px);
  mix-blend-mode:screen;
  animation:cold 2.2s infinite;
}
.scene.active .particles{
  opacity:.55;
  background-image:
    radial-gradient(circle,rgba(255,255,255,.7) 1px,transparent 2px),
    radial-gradient(circle,rgba(138,232,225,.55) 1px,transparent 2px);
  background-size:80px 80px,130px 130px;
  animation:particles 7s linear infinite;
}
@keyframes pulse{
  from{transform:scale(.7);opacity:.25}
  50%{opacity:.9}
  to{transform:scale(1.28);opacity:.15}
}
@keyframes cold{
  0%,100%{filter:brightness(1);opacity:.5}
  50%{filter:brightness(1.35);opacity:1}
}
@keyframes particles{
  from{background-position:0 0,0 0}
  to{background-position:0 -500px,120px -650px}
}
.scan{
  position:absolute;
  z-index:7;
  left:0;
  width:100%;
  height:3px;
  background:linear-gradient(90deg,transparent,#8ff3ff,transparent);
  box-shadow:0 0 30px #8ff3ff;
  animation:scan 3.5s linear infinite;
  opacity:.8;
}
@keyframes scan{
  from{top:0}
  to{top:100%}
}
</style>
</head>

<body>

<div id="app">
  <div class="play" id="play">
    <div>
      <h2>Skin Reset<br>3D Experience</h2>
      <p>Press play to watch the treatment like a cinematic 3D presentation with narration.</p>
      <button onclick="startVideo()">PLAY CINEMATIC TREATMENT</button>
    </div>
  </div>

  <div class="dark"></div>

  <div class="copy">
    <div class="kicker" id="kicker"></div>
    <h1 id="title"></h1>
    <p id="desc"></p>
  </div>

  <button class="skip" onclick="nextScene()">Next</button>
  <div class="progress" id="progress"></div>
</div>

<script>
const scenes = [
  {
    img:"piel-sucia.png",
    kicker:"Microscopic Skin Reality",
    title:"What is Demodex?",
    desc:"Demodex is a microscopic mite that can live naturally inside facial follicles. The goal of this facial is not to promise total eradication, but to deeply cleanse oil, buildup and surface residue while improving the look of texture and radiance.",
    voice:"Demodex is a microscopic mite that can live naturally inside facial follicles. This protocol is designed to deeply cleanse oil, buildup and surface residue, while improving the look of skin texture and radiance.",
    fx:"particles",
    time:10000
  },
  {
    img:"piel-sucia.png",
    kicker:"Step One",
    title:"Before the Facial",
    desc:"The pore may appear congested with oil, dead skin buildup and visible residue. This is why a regular facial is often not enough for skin that looks dull, rough or blocked.",
    voice:"Before the facial, the pore may appear congested with oil, dead skin buildup and visible residue. This is why a deeper protocol can help the skin look clearer and more refined.",
    fx:"scan",
    time:8500
  },
  {
    img:"ozono.png",
    kicker:"Step Two",
    title:"Ozone Steam + Salicylic Acid",
    desc:"Warm steam helps soften the surface while salicylic acid supports the removal of oil buildup and prepares the pore for extraction.",
    voice:"The treatment begins with ozone steam and salicylic acid. Warm steam helps soften the surface while salicylic acid supports the removal of oil buildup and prepares the pore for extraction.",
    fx:"steam",
    time:8500
  },
  {
    img:"hydrofacial.png",
    kicker:"Step Three",
    title:"Hydrofacial Deep Cleansing",
    desc:"Hydro-suction helps lift softened debris, oil and impurities from the pore while bathing the skin with a refreshing cleansing flow.",
    voice:"Next is Hydrofacial deep cleansing. Hydro suction helps lift softened debris, oil and impurities from the pore while refreshing the skin.",
    fx:"suction",
    time:8500
  },
  {
    img:"desp-de-hydrofacial.png",
    kicker:"Step Four",
    title:"After Hydrofacial",
    desc:"The pore now looks cleaner and less congested. The skin is prepared for renewal ingredients and device-based finishing.",
    voice:"After Hydrofacial, the pore looks cleaner and less congested. The skin is now prepared for renewal ingredients and device based finishing.",
    fx:"particles",
    time:7500
  },
  {
    img:"pollagen-antes.png",
    kicker:"Step Five",
    title:"Why Pollagen Comes Next",
    desc:"Even after cleansing, skin can still show texture, visible pores, fine lines and loss of firmness. Pollagen supports a smoother, more conditioned appearance.",
    voice:"Even after cleansing, skin can still show texture, visible pores, fine lines and loss of firmness. Pollagen supports a smoother, more conditioned appearance.",
    fx:"scan",
    time:8500
  },
  {
    img:"desp-pollagen.png",
    kicker:"Step Six",
    title:"Pollagen Renewal",
    desc:"This stage supports the look of firmer, more refined skin, helping the surface appear more polished before the D-Cool phase.",
    voice:"Pollagen renewal supports the look of firmer, more refined skin, helping the surface appear more polished before the D Cool phase.",
    fx:"heat",
    time:8500
  },
  {
    img:"d-cool-during-hot.png",
    kicker:"Step Seven",
    title:"D-Cool Hot Handle",
    desc:"The hot handle creates a warming activation phase. PRP growth factors, niacinamide and active serums are used topically to support a rejuvenated-looking finish.",
    voice:"D Cool begins with the hot handle. This warming activation phase is paired with topical PRP growth factors, niacinamide and active serums to support a rejuvenated looking finish.",
    fx:"heat",
    time:9500
  },
  {
    img:"d-cool-during-could.png",
    kicker:"Step Eight",
    title:"D-Cool Cold Handle + Aloe",
    desc:"The cold handle finishes the protocol with aloe hydration, a cooling sensation and a calmer-looking surface.",
    voice:"The cold handle finishes the protocol with aloe hydration, a cooling sensation and a calmer looking surface.",
    fx:"cold",
    time:8500
  },
  {
    img:"after-d-cool-and-whole-treatment.png",
    kicker:"Final Result",
    title:"Clean. Calm. Rejuvenated.",
    desc:"The final look is a cleaner pore environment, softer-looking texture, improved hydration, refined appearance and a healthy glow.",
    voice:"The final result is a cleaner pore environment, softer looking texture, improved hydration, refined appearance and a healthy glow.",
    fx:"particles",
    time:8500
  },
  {
    img:"beforeandafter2.png",
    kicker:"3D Skin Analysis",
    title:"Surface Texture Before & After",
    desc:"This conceptual 3D scan shows how roughness and pore depth can visually improve after the full facial sequence.",
    voice:"This 3D visualization shows how roughness and pore depth can visually improve after the full facial sequence.",
    fx:"scan",
    time:8500
  },
  {
    img:"beforeandafter3.png",
    kicker:"Final 3D Scan",
    title:"Pore Depth Visualization",
    desc:"The surface appears more even, smoother and less congested — the visual goal of the complete Skin Reset experience.",
    voice:"The surface appears more even, smoother and less congested. This is the visual goal of the complete Skin Reset experience.",
    fx:"scan",
    time:8500
  },
  {
    img:"whole-treatment-after.png",
    kicker:"Book The Experience",
    title:"This is not a basic facial.",
    desc:"This is a complete skin reset: cleanse, extract, renew, activate, cool and glow.",
    voice:"This is not a basic facial. This is a complete skin reset. Cleanse, extract, renew, activate, cool and glow.",
    fx:"particles",
    time:9000
  }
];

const app = document.getElementById("app");
const kicker = document.getElementById("kicker");
const title = document.getElementById("title");
const desc = document.getElementById("desc");
const progress = document.getElementById("progress");
const play = document.getElementById("play");

let current = 0;
let timer = null;
let running = false;

scenes.forEach((s,i)=>{
  const div = document.createElement("div");
  div.className = "scene" + (i===0 ? " active" : "");
  div.innerHTML = `
    <img src="${s.img}" alt="">
    <div class="effect ${s.fx || ""}"></div>
    ${s.fx === "scan" ? '<div class="scan"></div>' : ''}
  `;
  app.prepend(div);
});

const sceneEls = [...document.querySelectorAll(".scene")];

function speak(text){
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "en-US";
  u.rate = .88;
  u.pitch = 1;
  speechSynthesis.speak(u);
}

function showScene(i){
  current = i;
  sceneEls.forEach(el=>el.classList.remove("active"));
  sceneEls[i].classList.add("active");

  kicker.textContent = scenes[i].kicker;
  title.textContent = scenes[i].title;
  desc.textContent = scenes[i].desc;
  progress.style.width = ((i+1)/scenes.length*100) + "%";

  if(running) speak(scenes[i].voice);

  clearTimeout(timer);
  timer = setTimeout(nextScene, scenes[i].time);
}

function nextScene(){
  let next = current + 1;
  if(next >= scenes.length) next = 0;
  showScene(next);
}

function startVideo(){
  running = true;
  play.style.display = "none";
  showScene(0);
}

showScene(0);
</script>

</body>
</html>
