<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>D-Cool | Ultimate Skin Reset Cinematic Experience</title>
  <style>
    /* VARIABLES DE COLOR Y PARÁMETROS CINEMÁTICOS DE ALTA GAMA */
    :root {
      --bg: #04080c;
      --panel: rgba(11, 20, 27, 0.65);
      --panel-border: rgba(133, 227, 221, 0.18);
      --text: #f5f7f8;
      --muted: #a6b7c0;
      --aqua: #85e3dd;
      --blue: #6ca8f0;
      --gold: #f2c779;
      --purple: #b38eff;
      --ruby: #ff6b6b;
      --line: rgba(185, 229, 232, 0.12);
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    
    body {
      margin: 0;
      color: var(--text);
      background: 
        radial-gradient(circle at 15% 15%, rgba(43, 121, 140, 0.22), transparent 40%),
        radial-gradient(circle at 85% 75%, rgba(122, 82, 32, 0.15), transparent 35%),
        var(--bg);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overflow-x: hidden;
    }

    /* BARRA SUPERIOR DE NAVEGACIÓN Y PROGRESO */
    .topbar {
      position: fixed; inset: 0 0 auto 0; z-index: 100;
      display: flex; justify-content: space-between; align-items: center;
      padding: 20px clamp(20px, 5vw, 60px);
      background: linear-gradient(180deg, rgba(4, 8, 12, 0.95) 20%, rgba(4, 8, 12, 0.4) 70%, transparent);
      pointer-events: none;
    }
    .brand { font-size: 13px; letter-spacing: 4px; font-weight: 900; pointer-events: auto; }
    .brand span { color: var(--aqua); }
    .progress { width: min(220px, 30vw); height: 4px; background: rgba(255, 255, 255, 0.12); border-radius: 99px; overflow: hidden; }
    .progress i { display: block; width: 0%; height: 100%; background: linear-gradient(90deg, var(--aqua), var(--blue)); transition: width 0.3s ease-out; }

    /* CONTENEDOR PRINCIPAL DE DIAPOSITIVAS */
    .deck { width: 100%; }
    
    .slide {
      min-height: 100vh;
      padding: clamp(100px, 12vh, 150px) clamp(20px, 5vw, 80px) clamp(80px, 8vh, 120px);
      display: grid;
      align-items: center;
      position: relative;
      overflow: hidden;
      border-bottom: 1px solid var(--line);
    }
    .slide::before {
      content: ""; position: absolute; inset: 0;
      background: linear-gradient(90deg, rgba(4, 8, 12, 0.88) 0%, rgba(4, 8, 12, 0.15) 50%, rgba(4, 8, 12, 0.88) 100%);
      z-index: 1; pointer-events: none;
    }

    /* SECCIÓN HERO CINEMÁTICA */
    .hero { min-height: 100vh; text-align: center; display: grid; place-items: center; padding: 140px 20px 80px; }
    .hero::before { background: radial-gradient(circle at center, rgba(7, 22, 29, 0.25), rgba(4, 8, 12, 0.9) 75%); }
    .hero-bg { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.45; filter: contrast(1.05); transform: scale(1.03); transition: transform 2s ease; }
    .hero:hover .hero-bg { transform: scale(1.08); }
    .hero-content, .slide-content { position: relative; z-index: 10; }
    .hero-content { max-width: 950px; }
    
    .eyebrow { color: var(--aqua); font-size: 12px; letter-spacing: 5px; font-weight: 800; text-transform: uppercase; margin-bottom: 20px; }
    h1, h2, p { margin: 0; }
    h1 { font-family: 'Georgia', serif; font-size: clamp(44px, 7.5vw, 105px); line-height: 0.95; letter-spacing: -2px; text-shadow: 0 10px 30px rgba(0,0,0,0.7); }
    h1 em { font-style: normal; color: var(--aqua); linear-gradient(90deg, var(--aqua), var(--blue)); }
    .hero p { max-width: 680px; margin: 26px auto 0; color: #cedde2; font-size: clamp(16px, 1.8vw, 20px); line-height: 1.6; }
    
    .hero-actions { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; margin-top: 35px; }
    button, .btn { border: 1px solid rgba(151, 231, 225, 0.4); background: rgba(11, 29, 35, 0.75); color: white; padding: 14px 24px; border-radius: 99px; font-weight: 700; letter-spacing: 1px; cursor: pointer; transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); text-decoration: none; display: inline-flex; align-items: center; }
    button:hover, .btn:hover { transform: translateY(-3px); background: rgba(28, 70, 78, 0.9); box-shadow: 0 10px 20px rgba(133,227,221,0.15); border-color: var(--aqua); }
    .btn.primary { background: linear-gradient(90deg, #7ee6de, #62a3f0); color: #04080c; border: 0; font-weight: 800; }
    .btn.primary:hover { box-shadow: 0 10px 25px rgba(98,163,240,0.35); }
    .scroll-note { margin-top: 45px; font-size: 11px; letter-spacing: 4px; color: #a4b9c0; animation: bounce 2s infinite; }

    @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(8px); } }
